<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CollectData.io — Ad Previewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; }

        :root {
            --fb-bg: #f2f3f5;
            --fb-blue: #1877f2;
            --text-main: #050505;
            --text-sub: #65676b;
            --border: #ced0d4;
            --hifi-card-width: 375px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--fb-bg);
            margin: 0; padding: 0;
        }

        /* Sidebar/Controls */
        .controls {
            position: fixed; left: 0; top: 0; bottom: 0; width: 280px;
            background: white; padding: 25px 20px; border-right: 1px solid #ddd; z-index: 1000;
            overflow-y: auto;
        }
        .controls h2 { font-size: 16px; margin: 0 0 4px; color: var(--text-main); }
        .controls p  { font-size: 12px; color: var(--text-sub); margin: 0 0 20px; }
        .main-content { margin-left: 320px; padding: 40px 20px; }

        /* Filter buttons */
        #filter-list { display: flex; flex-direction: column; gap: 6px; }
        .filter-btn {
            text-align: left; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
            background: white; cursor: pointer; font-size: 13px; color: var(--text-main);
        }
        .filter-btn.active { background: var(--fb-blue); color: white; border-color: var(--fb-blue); }

        /* Ad Grid */
        .ad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--hifi-card-width), 1fr)); gap: 30px; justify-items: center; }

        /* HIFI Meta Card Structure */
        .meta-card {
            background: white;
            width: var(--hifi-card-width);
            border: 0.5px solid var(--border);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .text-padded { padding-left: 12px; padding-right: 12px; }

        /* Header */
        .card-header { padding: 12px 12px 10px; display: flex; align-items: center; gap: 8px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #eee; }
        .page-name { font-weight: 600; font-size: 14px; color: var(--fb-blue); margin-bottom: 0px; }
        .sponsored { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 3px; }

        /* Body Section */
        .primary-text-area { padding-bottom: 12px; font-size: 14px; line-height: 1.4; color: var(--text-main); }
        .ad-headline-para { font-weight: 400; margin-bottom: 8px; display: block; }
        .ad-body-para { white-space: pre-wrap; display: block; }

        /* Image */
        .ad-media-container { width: 100%; margin: 0; padding: 0; border: none; aspect-ratio: 1/1; background: #eee; overflow: hidden; line-height: 0; }
        .ad-img { width: 100%; height: 100%; object-fit: cover; display: block; border: none; margin: 0; padding: 0; }

        /* Footer */
        .card-footer {
            background: #f0f2f5;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e5e5e5;
        }
        .footer-info { flex: 1; padding-right: 10px; overflow: hidden; }
        .brand-tag { font-size: 11px; color: var(--text-sub); text-transform: uppercase; font-weight: 400; margin-bottom: 2px; letter-spacing: 0.5px; }
        .headline-link { font-weight: 700; font-size: 15px; color: var(--text-main); line-height: 1.2; }
        .description-link { font-size: 13px; color: var(--text-sub); margin-top: 2px; font-weight: 400; }
        .cta { background: #e4e6eb; padding: 8px 12px; border-radius: 6px; font-weight: 600; font-size: 13px; color: #050505; border: 0.5px solid #ccc; white-space: nowrap; }

        /* Social Proof Bar */
        .social-bar {
            padding: 10px 12px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-sub);
        }
        .social-left { display: flex; align-items: center; }
        .reaction-icons { display: flex; align-items: center; margin-right: 6px; }
        .reaction-icon-circle { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; border: 2.5px solid white; margin-left: -5px; }
        .reaction-icon-circle:first-child { margin-left: 0; z-index: 2; }
        .like-circle { background: var(--fb-blue); }
        .love-circle { background: #fb3958; }

        .empty { text-align: center; color: #999; padding: 100px; grid-column: 1/-1; }
        .loading { text-align: center; color: #999; padding: 100px; grid-column: 1/-1; font-size: 16px; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>CollectData.io</h2>
        <p>Ad Preview</p>
        <div id="filter-section">
            <h3 style="font-size:13px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;">Filter by Profile</h3>
            <div id="filter-list"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="ad-grid" id="ad-grid">
            <div class="loading">Loading ads…</div>
        </div>
    </div>

    <script>
        let adData = [];

        const slugify = (t) => t ? t.toString().toLowerCase().trim().replace(/\s+/g, '_').replace(/[^\w\-]+/g, '') : '';

        function imgPath(filename) {
            return 'ad_images/' + filename;
        }

        function setupFilters() {
            const list = document.getElementById('filter-list');
            const profiles = [...new Set(adData.map(a => a.Profile))];
            list.innerHTML = '<button class="filter-btn active" onclick="setFilter(\'All\', this)">All Ads</button>';
            profiles.forEach(p => {
                const b = document.createElement('button');
                b.className = 'filter-btn';
                b.innerText = p;
                b.onclick = (e) => setFilter(p, e.target);
                list.appendChild(b);
            });
        }

        function setFilter(p, b) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            render(p);
        }

        function render(filter = 'All') {
            const grid = document.getElementById('ad-grid');
            grid.innerHTML = '';

            const gPage = adData[0]['Page Name'] || 'Brand Name';
            const gLogo = adData[0]['Logo'] ? adData[0]['Logo'].toLowerCase() : '';
            const gCta  = adData[0]['CTA'] || 'Learn More';

            const filtered = filter === 'All' ? adData : adData.filter(a => a.Profile === filter);

            filtered.forEach(ad => {
                const imgKey = `${slugify(ad.Profile)}-${slugify(ad.Angle)}-${ad.Variation}.png`;
                const logoFile = ad.Logo ? ad.Logo.toLowerCase() : gLogo;
                const pageName = ad['Page Name'] || gPage;

                grid.innerHTML += `
                    <div class="meta-card">
                        <div class="card-header text-padded">
                            <img src="${imgPath(logoFile)}" class="avatar" onerror="this.style.background='#1877f2'">
                            <div>
                                <div class="page-name">${pageName}</div>
                                <div class="sponsored">Sponsored · 🌐</div>
                            </div>
                        </div>

                        <div class="primary-text-area text-padded">
                            <span class="ad-headline-para">${ad.Headline || ''}</span>
                            <span class="ad-body-para">${ad.Body || ''}</span>
                        </div>

                        <div class="ad-media-container">
                            <img src="${imgPath(imgKey)}" class="ad-img" onerror="this.style.display='none'">
                        </div>

                        <div class="card-footer">
                            <div class="footer-info">
                                <div class="brand-tag">${pageName}</div>
                                <div class="headline-link">${ad['Link Headline'] || ''}</div>
                                <div class="description-link">${ad['Link Description'] || ''}</div>
                            </div>
                            <div class="cta">${ad.CTA || gCta}</div>
                        </div>

                        <div class="social-bar">
                            <div class="social-left">
                                <div class="reaction-icons">
                                    <div class="reaction-icon-circle like-circle">👍</div>
                                    <div class="reaction-icon-circle love-circle">❤️</div>
                                </div>
                                <span style="font-weight:400">1.2K</span>
                            </div>
                            <div style="font-weight:400">45 Comments · 12 Shares</div>
                        </div>
                    </div>
                `;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty">No ads found.</div>';
            }
        }

        // Auto-load CSV on page start
        fetch('ads_revised.csv')
            .then(r => r.text())
            .then(text => {
                const result = Papa.parse(text, { header: true });
                adData = result.data.filter(x => x.Profile);
                setupFilters();
                render();
            })
            .catch(() => {
                document.getElementById('ad-grid').innerHTML = '<div class="empty">Could not load ads_revised.csv.</div>';
            });
    </script>
</body>
</html>
